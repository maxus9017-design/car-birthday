<!doctype html>
<html>
  <head>
    <title>Выбор автомобиля по весу для доставки ЛП</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Выбор автомобиля  для грузоперевозки</h1>
    <div class="container">
      <div class="grid-wrapper">
        <label for="avto-select" class="full-width-label"
          >Выбор авто по весу
        </label>
        <select id="avto-select" class="full-width-select">
          <option value="1500">Газель</option>
          <option value="5000">Валдай</option>
          <option value="20000">Фура</option>
        </select>
        <!-- Вес и обьем -->
        <div class="input-avto">
          <label for="weight-input">Вес груза в(кг)</label>
          <input
            type="number"
            id="cargo-weight"
            step="0.1"
            placeholder="0.00"
          />
          <label for="cargo-input">Обьем груза в (м3)</label>
          <input
            type="number"
            id="cargo-volume"
            step="0.1"
            placeholder="0.00"
          />
        </div>
      </div>

      <button id="calc-btn" onclick="rasschitat()">Проверить загрузку</button>
      <button id="reset-btn" onclick="ochistit()">очистить</button>

      <div id="result">Здесь появиться расчет...</div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
